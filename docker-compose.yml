services:
  db:
    # Plain postgres: the schema uses no PostGIS/spatial types (all geometry is stored as
    # text and distance math runs in Python), so the postgis image was unused weight.
    image: postgres:16
    environment:
      POSTGRES_DB: mca
      POSTGRES_USER: mca
      POSTGRES_PASSWORD: mca
    ports:
      - "5432:5432"
    volumes:
      - mca-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mca -d mca"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      # Defaults keep `docker compose up` working for local dev. For a shared
      # deploy, override via: docker compose --env-file .env.deploy up -d --build
      MCA_DATABASE_URL: ${MCA_DATABASE_URL:-postgresql+psycopg://mca:mca@db:5432/mca}
      MCA_ENVIRONMENT: ${MCA_ENVIRONMENT:-local}
      MCA_USER_HASH_SALT: ${MCA_USER_HASH_SALT:-local-docker-demo-salt}
      MCA_SESSION_SECRET: ${MCA_SESSION_SECRET:-local-docker-session-secret}
      MCA_SESSION_COOKIE_SECURE: "${MCA_SESSION_COOKIE_SECURE:-false}"
      MCA_PUBLIC_ENABLE_PERSONAL_UPLOADS: "${MCA_PUBLIC_ENABLE_PERSONAL_UPLOADS:-false}"
      MCA_ADMIN_INGEST_TOKEN: ${MCA_ADMIN_INGEST_TOKEN:-local-admin-token}
      MCA_LLM_BASE_URL: ${MCA_LLM_BASE_URL:-http://127.0.0.1:8080/v1}
      MCA_LLM_MODEL: ${MCA_LLM_MODEL:-gemma-4-26b-a4b-it-ud-q4-k-m-ctx32k}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      # /health is a readiness probe (pings the DB); start_period covers migrate + boot.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

  # Optional live-routing engine. Off by default (profile "otp"). It only --loads a
  # prebuilt graph, so build the graph once first (RAM-heavy, downloads OSM+GTFS):
  #   scripts/otp_setup.sh --rebuild        # downloads data + builds + serves, OR
  #   docker compose run --rm otp --build --save   # if OSM+GTFS are already in OTP_DATA_DIR
  # then:  docker compose --profile otp up -d otp
  # With this service the api can reach OTP in-network at http://otp:8080/otp/gtfs/v1.
  otp:
    image: docker.io/opentripplanner/opentripplanner:latest
    profiles: ["otp"]
    command: ["--load", "--serve"]
    environment:
      JAVA_TOOL_OPTIONS: ${OTP_HEAP:--Xmx8g}
    volumes:
      - ${OTP_DATA_DIR:-./otp-data}:/var/opentripplanner
    ports:
      - "8090:8080"
    restart: unless-stopped

volumes:
  mca-postgres:
