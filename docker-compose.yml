services:
  db:
    # Plain postgres: the schema uses no PostGIS/spatial types (all geometry is stored as
    # text and distance math runs in Python), so the postgis image was unused weight.
    image: postgres:16
    # pg_stat_statements powers the soak-test observer (docs/soak-testing.md): per-query
    # timing + plan-drift detection. Needs a preload lib, so a restart/recreate is required
    # to pick this up — harmless (~few MB shared memory) for normal dev.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    environment:
      POSTGRES_DB: mca
      POSTGRES_USER: mca
      POSTGRES_PASSWORD: mca
    ports:
      - "5432:5432"
    volumes:
      - mca-postgres:/var/lib/postgresql/data
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mca -d mca"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      # Defaults keep `docker compose up` working for local dev. For a shared
      # deploy, override via: docker compose --env-file .env.deploy up -d --build
      MCA_DATABASE_URL: ${MCA_DATABASE_URL:-postgresql+psycopg://mca:mca@db:5432/mca}
      MCA_ENVIRONMENT: ${MCA_ENVIRONMENT:-local}
      MCA_USER_HASH_SALT: ${MCA_USER_HASH_SALT:-local-docker-demo-salt}
      MCA_SESSION_SECRET: ${MCA_SESSION_SECRET:-local-docker-session-secret}
      MCA_SESSION_COOKIE_SECURE: "${MCA_SESSION_COOKIE_SECURE:-false}"
      MCA_PUBLIC_ENABLE_PERSONAL_UPLOADS: "${MCA_PUBLIC_ENABLE_PERSONAL_UPLOADS:-false}"
      MCA_ADMIN_INGEST_TOKEN: ${MCA_ADMIN_INGEST_TOKEN:-local-admin-token}
      MCA_LLM_BASE_URL: ${MCA_LLM_BASE_URL:-http://127.0.0.1:8080/v1}
      MCA_LLM_MODEL: ${MCA_LLM_MODEL:-gemma-4-26b-a4b-it-ud-q4-k-m-ctx32k}
      # Assistant failover (used only when both fallback vars are set).
      MCA_LLM_FALLBACK_BASE_URL: ${MCA_LLM_FALLBACK_BASE_URL:-}
      MCA_LLM_FALLBACK_MODEL: ${MCA_LLM_FALLBACK_MODEL:-}
      MCA_LLM_DISABLE_THINKING: "${MCA_LLM_DISABLE_THINKING:-false}"
      MCA_LLM_FALLBACK_DISABLE_THINKING: "${MCA_LLM_FALLBACK_DISABLE_THINKING:-false}"
      MCA_LLM_API_KEY: ${MCA_LLM_API_KEY:-}
      MCA_LLM_FALLBACK_API_KEY: ${MCA_LLM_FALLBACK_API_KEY:-}
      MCA_ASSISTANT_NARRATION_ENABLED: "${MCA_ASSISTANT_NARRATION_ENABLED:-true}"
      MCA_RATE_LIMIT_ENABLED: "${MCA_RATE_LIMIT_ENABLED:-false}"
      MCA_TRUST_PROXY_HEADERS: "${MCA_TRUST_PROXY_HEADERS:-false}"
      MCA_RATE_LIMIT_SESSIONS_PER_HOUR: "${MCA_RATE_LIMIT_SESSIONS_PER_HOUR:-10}"
      MCA_RATE_LIMIT_ASSISTANT_PER_HOUR: "${MCA_RATE_LIMIT_ASSISTANT_PER_HOUR:-20}"
      MCA_RATE_LIMIT_ASSISTANT_GLOBAL_PER_DAY: "${MCA_RATE_LIMIT_ASSISTANT_GLOBAL_PER_DAY:-100}"
      MCA_RATE_LIMIT_BURST_PER_MINUTE: "${MCA_RATE_LIMIT_BURST_PER_MINUTE:-120}"
      # Personal-upload retention (keep-only-clusters when false).
      MCA_RAW_UPLOAD_RETENTION: "${MCA_RAW_UPLOAD_RETENTION:-false}"
      # Crime ingest (Socrata) — optional app token.
      SOCRATA_APP_TOKEN: ${SOCRATA_APP_TOKEN:-}
      # Geocoding — contact email is REQUIRED when MCA_ENVIRONMENT=production (the app
      # refuses to boot otherwise), so these must reach the container.
      MCA_GEOCODER_PROVIDER: ${MCA_GEOCODER_PROVIDER:-nominatim}
      MCA_GEOCODER_BASE_URL: ${MCA_GEOCODER_BASE_URL:-https://nominatim.openstreetmap.org/search}
      MCA_GEOCODER_USER_AGENT: ${MCA_GEOCODER_USER_AGENT:-Waypoint/0.1}
      MCA_GEOCODER_CONTACT_EMAIL: ${MCA_GEOCODER_CONTACT_EMAIL:-}
      MCA_GEOCODER_CACHE_TTL_DAYS: "${MCA_GEOCODER_CACHE_TTL_DAYS:-30}"
      MCA_GEOCODER_MAX_RESULTS: "${MCA_GEOCODER_MAX_RESULTS:-5}"
      MCA_GEOCODER_TIMEOUT_S: "${MCA_GEOCODER_TIMEOUT_S:-5.0}"
      MCA_GEOCODER_MIN_INTERVAL_S: "${MCA_GEOCODER_MIN_INTERVAL_S:-1.0}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app/data/tiles:/app/app/data/tiles:ro
    ports:
      - "8000:8000"
    restart: "no"
    healthcheck:
      # /health is a readiness probe (pings the DB); start_period covers migrate + boot.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy

volumes:
  mca-postgres:
